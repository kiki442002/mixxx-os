BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-mixxx"
BBFILE_PATTERN_meta-mixxx = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-mixxx = "6"

LAYERDEPENDS_meta-mixxx = "core raspberrypi"
LAYERSERIES_COMPAT_meta-mixxx = "scarthgap"
